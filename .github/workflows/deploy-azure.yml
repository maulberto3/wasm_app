name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/wasm-app:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/wasm-app:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/wasm-app:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/wasm-app:buildcache,mode=max
      
      - name: Verify Docker image in registry
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/wasm-app:${{ github.sha }}
          echo "✅ Docker image successfully built and pushed to registry"
      
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKER_USERNAME }}/wasm-app:${{ github.sha }}
      
      - name: Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Docker image built and deployed to Azure successfully!"
            echo "Image: docker.io/${{ secrets.DOCKER_USERNAME }}/wasm-app:${{ github.sha }}"
            echo "App Name: ${{ secrets.AZURE_APP_NAME }}"
            echo "The app is now running on Azure App Service"
          else
            echo "❌ Deployment to Azure failed"
            echo "Check the logs above for details"
            exit 1
          fi

