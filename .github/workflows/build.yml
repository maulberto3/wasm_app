name: Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Install cargo-leptos
        run: cargo install --locked cargo-leptos
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-
      
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features
        
      - name: Check SSR compilation
        run: cargo check --features ssr
      
      - name: Check Hydrate compilation
        run: cargo check --lib --no-default-features --features hydrate
      
      - name: Run Rust tests
        run: cargo test --lib --verbose
        continue-on-error: true

      - name: Build Leptos
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            cargo leptos build --release
          else
            cargo leptos build
          fi
      
      - name: Display artifact sizes
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            BUILD_DIR="target/release"
            BUILD_TYPE="Release"
          else
            BUILD_DIR="target/debug"
            BUILD_TYPE="Debug"
          fi
          echo "=== Server Binary Size ($BUILD_TYPE) ==="
          du -sh $BUILD_DIR/wasm_app
          echo ""
          echo "=== WASM Package Size ==="
          du -sh target/site/pkg/
          echo ""
          echo "=== Total $BUILD_TYPE Build Size ==="
          du -sh $BUILD_DIR/
      
      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: target/*/wasm_app
          retention-days: 5
      
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-package
          path: target/site/pkg/
          retention-days: 5

