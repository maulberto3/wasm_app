name: Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Install cargo-leptos
        run: cargo install cargo-leptos
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-
      
      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-
      
      - name: Check SSR compilation
        run: cargo check --features ssr
      
      - name: Check Hydrate compilation
        run: cargo check --lib --no-default-features --features hydrate
      
      - name: Run Rust tests
        run: cargo test --lib --verbose
        continue-on-error: true

      - name: Build Leptos (Debug)
        if: github.ref == 'refs/heads/dev'
        run: cargo leptos build
      
      - name: Build Leptos (Release)
        if: github.ref == 'refs/heads/main'
        run: cargo leptos build --release
      
      - name: Display artifact sizes (Debug)
        if: github.ref == 'refs/heads/dev'
        run: |
          echo "=== Server Binary Size (Debug) ==="
          du -sh target/debug/wasm_app
          echo ""
          echo "=== WASM Package Size ==="
          du -sh target/site/pkg/
          echo ""
          echo "=== Total Debug Build Size ==="
          du -sh target/debug/
      
      - name: Display artifact sizes (Release)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "=== Server Binary Size (Release) ==="
          du -sh target/release/wasm_app
          echo ""
          echo "=== WASM Package Size ==="
          du -sh target/site/pkg/
          echo ""
          echo "=== Total Release Build Size ==="
          du -sh target/release/
      
      - name: Upload server artifacts
        uses: actions/upload-artifact@v3
        with:
          name: server-binary
          path: target/*/wasm_app
          retention-days: 5
      
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v3
        with:
          name: wasm-package
          path: target/site/pkg/
          retention-days: 5

