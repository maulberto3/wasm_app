name: Performance Benchmarks

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  benchmark:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Install cargo-leptos
        run: cargo install cargo-leptos
      
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build optimized Leptos
        run: cargo leptos build --release
      
      - name: Analyze bundle size
        run: |
          echo "=== Binary Size Analysis ==="
          echo ""
          echo "Server Binary:"
          ls -lh target/release/wasm_app_server
          echo ""
          echo "WASM Module Size:"
          ls -lh target/release/wasm_app_server/site/pkg/*.wasm
          echo ""
          echo "Total Package Size:"
          du -sh target/release/wasm_app_server/site/
          echo ""
          echo "Gzipped WASM Size:"
          gzip -c target/release/wasm_app_server/site/pkg/*.wasm | wc -c | awk '{print $1 " bytes"}'
      
      - name: Run optimization benchmarks
        continue-on-error: true
        run: |
          echo "=== Running CMA-ES benchmarks ==="
          cargo test optimization --lib -- --nocapture --test-threads=1

